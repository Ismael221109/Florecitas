<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tus Flores Amarillas 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #FFD700;
      --yellow-soft: #FFF176;
      --yellow-deep: #F9A825;
      --black: #0a0a0a;
      --card-bg: #1a1208;
      --card-border: #FFD700;
      --text-light: #fffde7;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      overflow-x: hidden;
      font-family: 'Lato', sans-serif;
      cursor: default;
    }

    /* ── PARTICLES CANVAS ── */
    #particles-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HERO TITLE ── */
    .hero {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px 20px 40px;
      pointer-events: none;
    }
    .hero-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: var(--yellow-soft);
      letter-spacing: 2px;
      opacity: 0.8;
      margin-bottom: 8px;
    }
    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 4.2rem);
      color: var(--yellow);
      line-height: 1.15;
      text-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 80px rgba(255,215,0,0.2);
    }
    .hero-title em {
      font-style: italic;
      color: var(--yellow-soft);
    }
    .hero-heart {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      display: block;
      margin-top: 10px;
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.25); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.15); }
      56%      { transform: scale(1); }
    }

    /* ── FLORES SVG en el DOM ── */
    .flower-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .flower {
      position: absolute;
      animation: floatFlower linear infinite;
      transform-origin: center bottom;
    }
    @keyframes floatFlower {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.85; }
      50%  { transform: translateY(-18px) rotate(6deg) scale(1.04); opacity: 1; }
      100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.85; }
    }

    /* ── CARDS CONTAINER ── */
    .cards-area {
      position: relative;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 10px 24px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card-wrapper {
      perspective: 900px;
      width: clamp(160px, 22vw, 220px);
      height: clamp(210px, 28vw, 290px);
      animation: flyIn 0.7s cubic-bezier(.23,1.3,.6,1) both;
      cursor: pointer;
    }
    @keyframes flyIn {
      from { opacity: 0; transform: translateY(-80px) scale(0.5) rotate(-12deg); }
      to   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(.4,0,.2,1);
      border-radius: 18px;
    }
    .card-wrapper.open .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      border: 2px solid var(--card-border);
      box-shadow: 0 0 22px rgba(255,215,0,0.25), inset 0 0 30px rgba(255,215,0,0.04);
    }

    /* FRONT */
    .card-front {
      background: radial-gradient(ellipse at 50% 30%, #1f1500 0%, #0a0a0a 100%);
    }
    .card-front .envelope-icon {
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
      animation: wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%,100% { transform: rotate(-5deg) scale(1); }
      50%      { transform: rotate(5deg) scale(1.08); }
    }
    .card-front .click-hint {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--yellow-soft);
      opacity: 0.85;
      letter-spacing: 1px;
    }
    .card-front .card-number {
      position: absolute;
      top: 12px; right: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      color: rgba(255,215,0,0.4);
    }
    /* little petals on front */
    .card-front::before {
      content: '✿';
      position: absolute;
      top: 10px; left: 14px;
      font-size: 1.1rem;
      color: rgba(255,215,0,0.35);
    }

    /* BACK */
    .card-back {
      background: radial-gradient(ellipse at 50% 60%, #1c1200 0%, #0d0900 100%);
      transform: rotateY(180deg);
      padding: 22px 18px;
      text-align: center;
    }
    .card-back .msg-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.82rem, 2vw, 1rem);
      color: var(--text-light);
      line-height: 1.7;
      font-style: italic;
    }
    .card-back .msg-emoji {
      font-size: clamp(1.4rem, 3vw, 2rem);
      margin-top: 6px;
    }
    .card-back::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      border-radius: 0 0 18px 18px;
    }

    /* ── BURST particle on open ── */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      font-size: 1.4rem;
      animation: burstAnim 0.9s ease-out forwards;
    }
    @keyframes burstAnim {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
    }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 3;
      text-align: center;
      padding: 20px;
      font-family: 'Dancing Script', cursive;
      font-size: clamp(0.9rem, 2.5vw, 1.15rem);
      color: rgba(255,215,0,0.4);
      letter-spacing: 1px;
    }

    /* ── RESPONSIVE tweaks ── */
    @media (max-width: 480px) {
      .cards-area { gap: 18px; padding-bottom: 70px; }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- Flores fijas en el DOM -->
<div class="flower-field" id="flowerField"></div>

<!-- Título -->
<header class="hero">
  <p class="hero-subtitle">Para ti, con todo</p>
  <h1 class="hero-title">
    Tus Flores Amarillas<br>
    <em>Tarde pero tuyas</em>
    <span class="hero-heart">💖</span>
  </h1>
</header>

<!-- Cartas -->
<div class="cards-area" id="cardsArea"></div>

<footer>hecho con amor 🌻</footer>

<script>

const MESSAGES = [
  { emoji: "🌻", text: "Todos los dias amandote y deseandote por que el amor que tengo por ti no se compara con el de nadie" },
  { emoji: "💛", text: "Eres mi vida y mi alma entera quiero que logremos todo juntos y que siempre estemos juntos el uno para el otro" },
  { emoji: "✨", text: "Que Dios te acompañe en cada paso que das y solo espero que sea junto a mi mi princesa hermosa" },
  { emoji: "🌼", text: "Te amo mi reina preciosa , te adoro con toda mi alma , gracias por aparecer en mi vida y por todo eso se que esto va durar para siempre , te amo" },
  { emoji: "💌", text: "Te amo tanto y tu sabias que desde un principio escogi el corazon rosado con brillantina por que  simboliza amor intenso, adoración, emoción y alegría deslumbrante" },
  { emoji: "🌟", text: "Se que son tarde pero son para ti , tenia todo preparado para hoy y hasta hoy termine todo esto te amo mucho mi reina hermosa y se que siempre vamos a estar juntos" },
];


/* ── Generar cartas ── */
const area = document.getElementById('cardsArea');
MESSAGES.forEach((m, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'card-wrapper';
  wrapper.style.animationDelay = `${i * 0.18}s`;

  wrapper.innerHTML = `
    <div class="card-inner">
      <div class="card-front">
        <span class="card-number">#${String(i+1).padStart(2,'0')}</span>
        <span class="envelope-icon">💌</span>
        <span class="click-hint">✦ da click aquí ✦</span>
      </div>
      <div class="card-back">
        <span class="msg-emoji">${m.emoji}</span>
        <p class="msg-text">${m.text}</p>
      </div>
    </div>`;

  wrapper.addEventListener('click', () => {
    wrapper.classList.toggle('open');
    if (wrapper.classList.contains('open')) spawnBurst(wrapper);
  });

  area.appendChild(wrapper);
});

/* ── Partículas de burst ── */
function spawnBurst(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['🌻','✨','💛','🌼','⭐','💫','🌟'];
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.5;
    const dist = 60 + Math.random() * 80;
    b.style.left = cx + 'px';
    b.style.top = cy + 'px';
    b.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    b.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    b.style.animationDelay = Math.random() * 0.15 + 's';
    document.body.appendChild(b);
    b.addEventListener('animationend', () => b.remove());
  }
}

/* ── Flores SVG en el DOM ── */
function makeSVGFlower(size, color1, color2) {
  const petalCount = 6;
  const r = size / 2;
  const pr = r * 0.45;
  let petals = '';
  for (let i = 0; i < petalCount; i++) {
    const angle = (i / petalCount) * Math.PI * 2;
    const px = r + Math.cos(angle) * pr * 1.1;
    const py = r + Math.sin(angle) * pr * 1.1;
    petals += `<ellipse cx="${px}" cy="${py}" rx="${pr * 0.55}" ry="${pr * 0.85}"
      fill="${color1}" opacity="0.92"
      transform="rotate(${(i / petalCount) * 360},${px},${py})"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${petals}
    <circle cx="${r}" cy="${r}" r="${r * 0.28}" fill="${color2}"/>
    <circle cx="${r}" cy="${r}" r="${r * 0.14}" fill="#fff8dc" opacity="0.8"/>
  </svg>`;
}

const field = document.getElementById('flowerField');
const flowerData = [
  { size: 90, c1: '#FFD700', c2: '#FF8F00' },
  { size: 64, c1: '#FFF176', c2: '#FFD700' },
  { size: 110, c1: '#FFCA28', c2: '#E65100' },
  { size: 50, c1: '#FFE57F', c2: '#FFA000' },
  { size: 78, c1: '#FFD740', c2: '#FF6F00' },
];

const FLOWER_COUNT = window.innerWidth < 480 ? 18 : 30;

for (let i = 0; i < FLOWER_COUNT; i++) {
  const d = flowerData[i % flowerData.length];
  const el = document.createElement('div');
  el.className = 'flower';
  el.style.left = Math.random() * 98 + 'vw';
  el.style.top = Math.random() * 95 + 'vh';
  el.style.animationDuration = (4 + Math.random() * 6) + 's';
  el.style.animationDelay = -(Math.random() * 8) + 's';
  el.style.opacity = (0.25 + Math.random() * 0.55).toString();
  el.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.5 + Math.random() * 0.8})`;
  el.innerHTML = makeSVGFlower(d.size, d.c1, d.c2);
  field.appendChild(el);
}

/* ── Canvas: partículas de polvo dorado ── */
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(true); }
  reset(random = false) {
    this.x = Math.random() * W;
    this.y = random ? Math.random() * H : H + 10;
    this.r = 0.8 + Math.random() * 2.2;
    this.vy = -(0.25 + Math.random() * 0.7);
    this.vx = (Math.random() - 0.5) * 0.4;
    this.alpha = 0.1 + Math.random() * 0.55;
    this.life = 0;
    this.maxLife = 200 + Math.random() * 300;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life++;
    if (this.y < -10 || this.life > this.maxLife) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,215,0,${this.alpha})`;
    ctx.fill();
  }
}

const PARTICLE_COUNT = window.innerWidth < 480 ? 55 : 100;
for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();
</script>
</body>
</html>
